<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />

    <title>Modern Tip Calculator</title>

    <link rel="stylesheet" href="/css/main.css" />
</head>

<body>
    <header></header>
    <main class="tip-calculator-container">
        <section class="tip-dataEntry-panel">
            <form id="tip-form">
                <div class="form-input-container">
                    <label for="bill-total" class="label-text">Total Bill</label>
                    <input type="number" name="bill-total" id="bill-total" min="0" step="0.01" placeholder="$0.00" />
                </div>

                <fieldset class="form-input-container">
                    <legend>Select Tip (%):</legend>
                    <label for="tip10" class="radio-btn-container">
                        <input type="radio" name="tip" value="10" id="tip10" /> 10%
                    </label>
                    <label for="tip15" class="radio-btn-container">
                        <input type="radio" name="tip" value="15" id="tip15" /> 15%
                    </label>
                    <label for="tip20" class="radio-btn-container">
                        <input type="radio" name="tip" value="20" id="tip20" /> 20%
                    </label>
                    <label for="tip25" class="radio-btn-container">
                        <input type="radio" name="tip" value="25" id="tip25" /> 25%
                    </label>
                    <label for="tip30" class="radio-btn-container">
                        <input type="radio" name="tip" value="30" id="tip30" /> 30%
                    </label>
                </fieldset>

                <div class="form-input-container">
                    <label for="num-people" class="label-text">Number of People</label>
                    <input type="number" name="num-people" id="num-people" min="1" value="0" placeholder="0" required />
                </div>
            </form>
        </section>

        <section class="tip-info-panel">
            <div>
                <div class="checkout-row">
                    <div>
                        <p>Tip Amount</p>
                        <span>/ per person</span>
                    </div>
                    <output id="total-per-person">$0.00</output>
                </div>

                <div class="checkout-row">
                    <div>
                        <p>Total</p>
                        <span>/ per person</span>
                    </div>
                    <output id="tip-per-person">$0.00</output>
                </div>
            </div>
            <div class="checkout-row">
                <button type="reset" form="tip-form">Reset</button>
            </div>
        </section>
    </main>
    <footer></footer>
</body>

</html>
