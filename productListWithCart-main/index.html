<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/custom.css">

    <link rel="icon" type="image/x-icon" href="./ico/favicon.ico">

    <title>Resturant Menu</title>

    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>
    <main>
        <section>
            <h2>Desserts</h2>
            <div id="menuItem-container"></div>
        </section>

        <aside id="shopping-cart">
            <header>
                <h3 id="cart-title">Your Cart (<span id="cartItem-qty" aria-live="polite">0</span>)</h3>
                <hr>
            </header>
            <ul id="cart-container"></ul>
            <footer>
                <hr>
                <div class="order-summary">
                    <p class="total-line">
                        <strong>Order Total</strong>
                        <output for="cart-container" id="order-total-display">
                            <data value="0.00" id="sum-total">$0.00</data>
                        </output>
                    </p>

                    <small class="delivery-badge">
                        <span aria-hidden="true">
                            <i data-feather="heart" id="carbon-neutral-icon"></i>
                        </span> This is a carbon neutral delivery
                    </small>
                </div>
                <button type="button" id="confirm-order">Confirm Order</button>
            </footer>
        </aside>
    </main>

    <dialog role="dialog" id="shoppingCart-Dialog">
        <section id="shopping-cart" aria-labelledby="cart-title">
            <header>
                <i data-feather="check-circle" id="checkmark-icon"></i>
                <div>
                    <h3 id="dialog-title">Your Order has been confirmed!</h3>
                    <p>We hope you enjoy your food</p>
                </div>
            </header>

            <ul id="cart-container"></ul>

            <footer>
                <div class="order-summary">
                    <p class="total-line">
                        <strong>Order Total</strong>
                        <output for="cart-container" id="order-total-display">
                            <data value="0.00">$0.00</data>
                        </output>
                    </p>
                </div>
            </footer>

            <button type="button" id="new-order" autofocus>Start New Order</button>
        </section>
    </dialog>

    <template id="card-template">
        <article class="card">
            <header class="card-header">
                <img src="https://placehold.co/600@2x.png" alt="Food Item">
                <div class="action-container">
                    <button type="button" class="order-controls"><i data-feather="shopping-cart"></i> Add to Cart</button>
                    <div class="qty-controls">
                        <button type="button"><i data-feather="minus-circle"></i></button>
                        <data value="" class="food-count"></data>
                        <button type="button"><i data-feather="plus-circle"></i></button>
                    </div>
                </div>
            </header>
            <footer class="card-footer">
                <div class="footer-heading">
                    <h3 class="food-name"></h3>
                    <div class="sub-container">
                        <p>Price: <data class="food-price" value=""></data></p>
                        <p>Qty: <data class="food-quantity" value=""></data></p>
                    </div>
                </div>
                <section class="classification">
                    <p>Category: <data class="food-category" value=""></data></p>
                    <p>Type: <data class="food-type" value=""></data></p>
                </section>
            </footer>
        </article>
    </template>

    <template id="cartItem-template">
        <li class="cart-item">
            <div>
                <strong class="item-name">Item#1</strong>
                <div class="item-details">
                    <label>Qty:
                        <data class="item-qty" value="">0</data>
                    </label>
                    <small class="unit-price">($0.00 each)</small>
                </div>
            </div>
            <div class="price-info">
                <data class="item-total" value="">$0.00</data>
            </div>
        </li>
    </template>

    <script>
        feather.replace();
    </script>

    <script src="./js/main.js"></script>
</body>

</html>
